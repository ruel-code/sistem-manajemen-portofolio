<!DOCTYPE html>
<html lang="en" x-data="{ darkMode: false, sidebarOpen: true }" :class="{ 'dark': darkMode }">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NexaCRM - Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { sidebar: '#0f0f1a', active: 'rgba(99, 102, 241, 0.15)', indigo: '#6366f1' } }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar { background: #0f0f1a; transition: width 0.3s ease; width: 260px; }
        .sidebar-collapsed { width: 80px; }
        .nav-item { transition: all 0.2s; border-radius: 12px; color: #94a3b8; }
        .nav-item:hover, .nav-item.active { background: rgba(99, 102, 241, 0.15); color: #818cf8; }
        .nav-item.active { border-left: 4px solid #6366f1; }
        .fc { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] text-gray-900 min-h-screen">
<div class="flex h-screen overflow-hidden">
    <!-- SIDEBAR -->
    <aside class="sidebar flex-shrink-0 flex flex-col h-full z-30 shadow-2xl" :class="{ 'sidebar-collapsed': !sidebarOpen }">
        <div class="px-6 py-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 shadow-lg" style="background: linear-gradient(135deg, #6366f1, #8b5cf6)">
                    <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <span class="font-bold text-xl text-white tracking-tight" x-show="sidebarOpen">Nexa<span class="text-indigo-400">CRM</span></span>
            </div>
            <button @click="sidebarOpen = !sidebarOpen" class="text-gray-500 hover:text-white transition">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/></svg>
            </button>
        </div>
        <nav class="flex-1 px-4 space-y-1 overflow-y-auto">
            <a href="index.html" class="nav-item flex items-center gap-3 px-4 py-3">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                <span class="text-sm font-medium" x-show="sidebarOpen">Dashboard</span>
            </a>
            <a href="projects.html" class="nav-item flex items-center gap-3 px-4 py-3">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                <span class="text-sm font-medium" x-show="sidebarOpen">Projects</span>
            </a>
            <a href="calendar.html" class="nav-item active flex items-center gap-3 px-4 py-3">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                <span class="text-sm font-medium" x-show="sidebarOpen">Calendar</span>
            </a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white border-b border-gray-100 flex items-center px-8 gap-4 flex-shrink-0">
            <div class="flex-1"><span class="text-gray-400">NexaCRM</span> / <span class="font-medium text-gray-600">Calendar</span></div>
            <div class="w-9 h-9 rounded-full bg-indigo-500 flex items-center justify-center text-white text-xs font-bold border-2 border-white shadow-sm">SU</div>
        </header>

        <main class="flex-1 overflow-y-auto p-8">
            <div class="bg-white border border-gray-100 rounded-3xl p-8 shadow-sm">
                <div id="calendar"></div>
            </div>
        </main>
    </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const calendarEl = document.getElementById('calendar');
    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,listWeek' },
        events: [
            { title: 'Website Launch', start: '2026-05-29', color: '#6366f1' },
            { title: 'ERP Review', start: '2026-05-19', color: '#06b6d4' }
        ]
    });
    calendar.render();
});
</script>
</body>
</html>
